interval_secs = 5
data_dir = "/var/lib/linewatch"

[targets]
tcp_anchors = ["1.1.1.1:443", "8.8.8.8:443"]
icmp_anchors = []
dns_upstream = "1.1.1.1:53"
dns_query_name = "cloudflare.com"
http_url = "https://www.google.com/generate_204"

[thresholds]
max_loss_pct = 10
max_rtt_ms = 200

[debounce]
open_after = 3
close_after = 3

[temp]
source = "open-meteo"
lat = 41.77
lon = 12.66
static_c = null
